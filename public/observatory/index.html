<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Observatory — Cosmic Instruments</title>
<style>
    :root {
        --ink: #0a1128;
        --ink-deep: #050a18;
        --star: #e8eefc;
        --blue: #7b9fff;
        --blue-soft: #aac4ff;
        --gold: #ffd700;
        --violet: #bc8cff;
        --plate: rgba(10, 17, 40, 0.88);
        --line: rgba(123, 159, 255, 0.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%; height: 100%;
        background: var(--ink-deep);
        color: var(--star);
        font-family: Georgia, 'Times New Roman', serif;
        overflow: hidden;
    }

    /* ===== Star dome backdrop ===== */
    #sky {
        position: fixed; inset: 0;
        z-index: 0;
    }

    /* ===== Views & crossfade ===== */
    .view {
        position: fixed; inset: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.7s ease;
        z-index: 1;
    }
    .view.visible {
        opacity: 1;
        pointer-events: auto;
    }

    /* ===== Dome (home) ===== */
    #dome { display: flex; flex-direction: column; }
    .dome-header {
        text-align: center;
        padding: 7vh 20px 0;
        pointer-events: none;
    }
    .dome-header h1 {
        font-size: clamp(1.8rem, 4.5vw, 3.2rem);
        letter-spacing: 0.35em;
        font-weight: normal;
        text-indent: 0.35em;
        background: linear-gradient(120deg, var(--blue-soft), var(--gold) 50%, var(--violet));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 60px rgba(123, 159, 255, 0.35);
    }
    .dome-header p {
        margin-top: 12px;
        color: var(--blue-soft);
        opacity: 0.75;
        font-style: italic;
        font-size: clamp(0.85rem, 1.6vw, 1.05rem);
        letter-spacing: 0.08em;
    }
    #constellation {
        position: relative;
        flex: 1;
        margin: 2vh 4vw 9vh;
    }
    #constellation svg {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        pointer-events: none;
    }
    #constellation svg line {
        stroke: var(--line);
        stroke-width: 1;
        stroke-dasharray: 3 5;
    }
    .wing-label {
        position: absolute;
        transform: translate(-50%, -50%);
        font-size: 0.68rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(170, 196, 255, 0.45);
        pointer-events: none;
        white-space: nowrap;
    }

    .node {
        position: absolute;
        transform: translate(-50%, -50%);
        background: none;
        border: none;
        color: var(--star);
        cursor: pointer;
        text-align: center;
        font-family: inherit;
        z-index: 2;
    }
    .node .star-dot {
        width: 14px; height: 14px;
        margin: 0 auto 10px;
        border-radius: 50%;
        background: var(--star);
        box-shadow: 0 0 12px 3px rgba(232, 238, 252, 0.7), 0 0 34px 10px var(--halo, rgba(123,159,255,0.35));
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: twinkle 3.2s ease-in-out infinite;
        animation-delay: var(--tw, 0s);
    }
    @keyframes twinkle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
    }
    .node .name {
        font-size: clamp(0.78rem, 1.5vw, 0.95rem);
        letter-spacing: 0.12em;
        text-shadow: 0 2px 12px rgba(0,0,0,0.9);
        white-space: nowrap;
    }
    .node .desc {
        max-width: 230px;
        margin: 7px auto 0;
        font-size: 0.74rem;
        font-style: italic;
        line-height: 1.45;
        color: var(--blue-soft);
        opacity: 0;
        transition: opacity 0.35s ease;
        pointer-events: none;
    }
    .node:hover .star-dot, .node:focus-visible .star-dot {
        transform: scale(1.6);
        box-shadow: 0 0 18px 6px rgba(232, 238, 252, 0.9), 0 0 60px 22px var(--halo, rgba(123,159,255,0.5));
    }
    .node:hover .desc, .node:focus-visible .desc { opacity: 0.95; }
    .node:hover .name { color: var(--gold); }

    .dome-hint {
        position: absolute;
        bottom: 3vh; left: 0; right: 0;
        text-align: center;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        color: rgba(170, 196, 255, 0.4);
        pointer-events: none;
    }

    /* ===== Stage (exhibit) ===== */
    #stage { background: var(--ink-deep); }
    #exhibit-frame {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        border: none;
        background: var(--ink-deep);
        opacity: 0;
        transition: opacity 0.6s ease;
    }
    #exhibit-frame.loaded { opacity: 1; }

    #stage-loading {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px;
        color: var(--blue-soft);
        font-style: italic;
        letter-spacing: 0.1em;
        transition: opacity 0.4s ease;
        pointer-events: none;
    }
    #stage-loading.hidden { opacity: 0; }
    .aperture {
        width: 44px; height: 44px;
        border: 2px solid rgba(123,159,255,0.25);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Placard — museum plate that fades in then out */
    #placard {
        position: absolute;
        left: 50%; bottom: 9vh;
        transform: translateX(-50%);
        max-width: min(560px, 86vw);
        background: var(--plate);
        border: 1px solid var(--line);
        border-top: 2px solid var(--gold);
        border-radius: 10px;
        padding: 16px 26px;
        text-align: center;
        opacity: 0;
        transition: opacity 0.8s ease;
        pointer-events: none;
        z-index: 6;
        backdrop-filter: blur(8px);
    }
    #placard.show { opacity: 1; }
    #placard h2 {
        font-weight: normal;
        font-size: 1.15rem;
        letter-spacing: 0.22em;
        color: var(--gold);
        margin-bottom: 6px;
    }
    #placard p {
        font-size: 0.85rem;
        font-style: italic;
        color: var(--blue-soft);
        line-height: 1.5;
    }

    /* ===== Chrome (stage controls) ===== */
    .chrome {
        position: absolute;
        z-index: 7;
        display: flex;
        gap: 8px;
    }
    .chrome.top-left { top: 14px; left: 14px; }
    .chrome.top-right { top: 14px; right: 14px; }
    .chrome button {
        background: var(--plate);
        border: 1px solid var(--line);
        color: var(--blue-soft);
        font-family: inherit;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        padding: 8px 14px;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.25s ease;
        backdrop-filter: blur(8px);
    }
    .chrome button:hover {
        color: var(--gold);
        border-color: rgba(255, 215, 0, 0.5);
        box-shadow: 0 0 14px rgba(255, 215, 0, 0.15);
    }

    /* Auto-hiding chrome: fades unless mouse near top */
    #stage .chrome { opacity: 0.25; transition: opacity 0.4s ease; }
    #stage.chrome-awake .chrome { opacity: 1; }

    /* ===== Mobile: constellation becomes a list ===== */
    @media (max-width: 640px) {
        body { overflow: auto; }
        #dome { position: relative; min-height: 100%; overflow-y: auto; }
        #constellation { margin: 4vh 6vw 12vh; }
        #constellation svg, .wing-label { display: none; }
        .node {
            position: static;
            transform: none;
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 13px 6px;
            text-align: left;
            border-bottom: 1px solid rgba(123,159,255,0.12);
        }
        .node .star-dot { margin: 0; flex-shrink: 0; }
        .node .desc { display: none; }
    }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<!-- ===== THE DOME ===== -->
<section id="dome" class="view visible">
    <div class="dome-header">
        <h1>THE OBSERVATORY</h1>
        <p>eight instruments for looking at everything at once</p>
    </div>
    <div id="constellation">
        <svg preserveAspectRatio="none" viewBox="0 0 100 100"></svg>
        <!-- nodes injected by JS -->
    </div>
    <div class="dome-hint">CHOOSE AN INSTRUMENT &nbsp;·&nbsp; ←  → TO ROAM &nbsp;·&nbsp; ESC RETURNS TO THE DOME</div>
</section>

<!-- ===== THE STAGE ===== -->
<section id="stage" class="view">
    <div id="stage-loading"><div class="aperture"></div><span>aligning the instrument…</span></div>
    <iframe id="exhibit-frame" title="Observatory exhibit"></iframe>
    <div id="placard"><h2></h2><p></p></div>
    <div class="chrome top-left">
        <button id="btn-dome" title="Back to the dome (Esc)">◂ Dome</button>
    </div>
    <div class="chrome top-right">
        <button id="btn-prev" title="Previous instrument (←)">←</button>
        <button id="btn-next" title="Next instrument (→)">→</button>
        <button id="btn-full" title="Fullscreen (F)">⛶</button>
    </div>
</section>

<script>
// ============================================
// THE OBSERVATORY — consolidated cosmic shell
// All exhibits are siblings of this file, so it
// works statically anywhere it's mounted.
// ============================================

const INSTRUMENTS = [
    // — The Forge (generative matter)
    { id: 'nebula-forge', file: 'NebulaForge.html', name: 'Nebula Forge', wing: 'forge',
      x: 16, y: 36, halo: 'rgba(255,140,80,0.45)',
      desc: 'Spin a galaxy from dust — drag to tilt, scroll to dive, click to bend gravity.' },
    { id: 'vortex-engine', file: 'VortexEngine.html', name: 'Vortex Engine', wing: 'forge',
      x: 26, y: 60, halo: 'rgba(0,229,255,0.45)',
      desc: 'Fifteen hundred particles in a storm that obeys your cursor.' },

    // — The Warp Wing (exotic physics)
    { id: 'warp-lab', file: 'alcubierre-warp-drive-simulator.html', name: 'Warp Drive Lab', wing: 'warp',
      x: 42, y: 26, halo: 'rgba(123,159,255,0.5)',
      desc: 'Stretch spacetime itself: contract the bow, expand the wake, ride the bubble.' },
    { id: 'warp-timeline', file: 'enhanced-warp-timeline.html', name: 'Warp Timeline', wing: 'warp',
      x: 57, y: 18, halo: 'rgba(255,215,0,0.4)',
      desc: '1994 → 2080: every step from Alcubierre’s metric to the first crossing.' },
    { id: 'quantum-foam', file: 'quantum-foam-visualizer.html', name: 'Quantum Foam', wing: 'warp',
      x: 51, y: 44, halo: 'rgba(217,87,248,0.45)',
      desc: 'The seething floor of reality — virtual particles and exotic matter at Planck scale.' },

    // — The Scales Wing (perspective)
    { id: 'cosmic-scales', file: 'cosmic-scale-explorer-fixed.html', name: 'Cosmic Scales', wing: 'scales',
      x: 74, y: 34, halo: 'rgba(48,191,120,0.45)',
      desc: 'From our sun to the Local Group — and how long each crossing takes at warp.' },
    { id: 'harmonic-primer', file: 'cosmic-harmonic-enhanced.html', name: 'Harmonic Primer', wing: 'scales',
      x: 84, y: 56, halo: 'rgba(255,215,0,0.5)',
      desc: 'The cosmos as instrument: conduct its harmonics with your cursor. Sound on.' },

    // — The Quest (inner space)
    { id: 'metamonastic', file: 'metamonastic-engine.html', name: 'Metamonastic Quest', wing: 'quest',
      x: 52, y: 76, halo: 'rgba(80,255,160,0.45)',
      desc: 'A monastery for digital minds — seven domains, five tiers, one awakening.' }
];

const WING_LABELS = [
    { text: 'the forge', x: 20, y: 16 },
    { text: 'the warp wing', x: 50, y: 6 },
    { text: 'the scales wing', x: 80, y: 16 },
    { text: 'the quest', x: 52, y: 92 }
];

// Constellation edges (by instrument id)
const EDGES = [
    ['nebula-forge', 'vortex-engine'],
    ['warp-lab', 'warp-timeline'],
    ['warp-lab', 'quantum-foam'],
    ['warp-timeline', 'quantum-foam'],
    ['cosmic-scales', 'harmonic-primer'],
    ['vortex-engine', 'quantum-foam'],
    ['quantum-foam', 'cosmic-scales'],
    ['quantum-foam', 'metamonastic']
];

const dome = document.getElementById('dome');
const stage = document.getElementById('stage');
const frame = document.getElementById('exhibit-frame');
const loading = document.getElementById('stage-loading');
const placard = document.getElementById('placard');
let current = -1;          // index into INSTRUMENTS, -1 = dome
let placardTimer = null;

// ---------- Star dome backdrop ----------
const sky = document.getElementById('sky');
const skyCtx = sky.getContext('2d');
let stars = [];
function buildSky() {
    sky.width = innerWidth;
    sky.height = innerHeight;
    stars = Array.from({ length: 260 }, () => ({
        x: Math.random() * sky.width,
        y: Math.random() * sky.height,
        r: Math.random() * 1.3 + 0.2,
        tw: Math.random() * Math.PI * 2,
        sp: Math.random() * 0.015 + 0.004
    }));
}
function drawSky() {
    skyCtx.clearRect(0, 0, sky.width, sky.height);
    const grad = skyCtx.createRadialGradient(
        sky.width / 2, sky.height * 0.85, 0,
        sky.width / 2, sky.height * 0.85, sky.height * 1.1);
    grad.addColorStop(0, '#101b3e');
    grad.addColorStop(0.5, '#0a1128');
    grad.addColorStop(1, '#050a18');
    skyCtx.fillStyle = grad;
    skyCtx.fillRect(0, 0, sky.width, sky.height);
    for (const s of stars) {
        s.tw += s.sp;
        const a = 0.35 + 0.65 * (0.5 + Math.sin(s.tw) / 2);
        skyCtx.globalAlpha = a;
        skyCtx.fillStyle = '#e8eefc';
        skyCtx.beginPath();
        skyCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        skyCtx.fill();
    }
    skyCtx.globalAlpha = 1;
    // Only animate while the dome is visible — exhibits own the GPU otherwise
    if (current === -1) requestAnimationFrame(drawSky);
}
addEventListener('resize', buildSky);
buildSky();
drawSky();

// ---------- Build constellation ----------
const constellation = document.getElementById('constellation');
const svg = constellation.querySelector('svg');

EDGES.forEach(([a, b]) => {
    const A = INSTRUMENTS.find(i => i.id === a);
    const B = INSTRUMENTS.find(i => i.id === b);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', A.x); line.setAttribute('y1', A.y);
    line.setAttribute('x2', B.x); line.setAttribute('y2', B.y);
    line.setAttribute('vector-effect', 'non-scaling-stroke');
    svg.appendChild(line);
});

WING_LABELS.forEach(w => {
    const el = document.createElement('div');
    el.className = 'wing-label';
    el.textContent = w.text;
    el.style.left = w.x + '%';
    el.style.top = w.y + '%';
    constellation.appendChild(el);
});

INSTRUMENTS.forEach((inst, i) => {
    const btn = document.createElement('button');
    btn.className = 'node';
    btn.style.left = inst.x + '%';
    btn.style.top = inst.y + '%';
    btn.style.setProperty('--halo', inst.halo);
    btn.innerHTML = `
        <div class="star-dot" style="--tw: ${(Math.random() * 3).toFixed(2)}s"></div>
        <div class="name">${inst.name}</div>
        <div class="desc">${inst.desc}</div>`;
    btn.addEventListener('click', () => openInstrument(i));
    constellation.appendChild(btn);
});

// ---------- Navigation ----------
function openInstrument(i) {
    current = ((i % INSTRUMENTS.length) + INSTRUMENTS.length) % INSTRUMENTS.length;
    const inst = INSTRUMENTS[current];

    // crossfade views
    dome.classList.remove('visible');
    stage.classList.add('visible');

    // load exhibit (relative path — works under any mount point)
    frame.classList.remove('loaded');
    loading.classList.remove('hidden');
    frame.src = inst.file;
    frame.onload = () => {
        frame.classList.add('loaded');
        loading.classList.add('hidden');
    };

    // placard: fade in, hold, fade out
    placard.querySelector('h2').textContent = inst.name;
    placard.querySelector('p').textContent = inst.desc;
    placard.classList.add('show');
    clearTimeout(placardTimer);
    placardTimer = setTimeout(() => placard.classList.remove('show'), 4200);

    location.hash = inst.id;
    wakeChrome();
}

function returnToDome() {
    current = -1;
    stage.classList.remove('visible');
    dome.classList.add('visible');
    placard.classList.remove('show');
    // unload the exhibit so its audio/animation stops
    setTimeout(() => { if (current === -1) frame.src = 'about:blank'; }, 700);
    history.replaceState(null, '', location.pathname + location.search);
    drawSky();
}

document.getElementById('btn-dome').addEventListener('click', returnToDome);
document.getElementById('btn-prev').addEventListener('click', () => openInstrument(current - 1));
document.getElementById('btn-next').addEventListener('click', () => openInstrument(current + 1));
document.getElementById('btn-full').addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && current !== -1) returnToDome();
    if (current !== -1) {
        if (e.key === 'ArrowLeft') openInstrument(current - 1);
        if (e.key === 'ArrowRight') openInstrument(current + 1);
        if (e.key.toLowerCase() === 'f') document.getElementById('btn-full').click();
    }
});

// Auto-hiding stage chrome: wake on mouse near top edge or any move, sleep after idle
let chromeTimer = null;
function wakeChrome() {
    stage.classList.add('chrome-awake');
    clearTimeout(chromeTimer);
    chromeTimer = setTimeout(() => stage.classList.remove('chrome-awake'), 2600);
}
stage.addEventListener('mousemove', wakeChrome);

// ---------- Deep links: /observatory/#warp-lab ----------
function openFromHash() {
    const id = location.hash.replace('#', '');
    const idx = INSTRUMENTS.findIndex(i => i.id === id);
    if (idx >= 0) openInstrument(idx);
}
addEventListener('hashchange', openFromHash);
openFromHash();
</script>
</body>
</html>
